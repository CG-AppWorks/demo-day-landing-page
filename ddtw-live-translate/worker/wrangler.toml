name = "ddtw-captions"
main = "src/index.js"
compatibility_date = "2026-06-01"

# ---------------------------------------------------------------------------
# Single Durable Object instance ("event") holds all live caption state and
# fans SSE segments out to ~400 guest phones. See spec §2.1.
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "CAPTION_HUB"
class_name = "CaptionHub"

[[migrations]]
tag = "v1"
# SQLite-backed DOs are required on the free plan (and are now the default).
# The storage KV API (storage.get/put) used by CaptionHub works unchanged.
new_sqlite_classes = ["CaptionHub"]

# ---------------------------------------------------------------------------
# KV: persistence + polling fallback (latest N segments per channel, active
# flag). Create once, then paste the id below:
#   npx wrangler kv namespace create captions_kv
# Local `wrangler dev` simulates KV regardless of this id.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "CAPTIONS_KV"
id = "fb3cbbd2334d4affa2fa9e0b79686757"

# Static pages (guest viewer + admin switch panel) served from ./public.
# Requests that don't match a file fall through to the Worker (api/* + /health).
[assets]
directory = "./public"

[observability]
enabled = true

# Secrets (NOT stored here) — set before deploy:
#   npx wrangler secret put ADMIN_TOKEN
#   npx wrangler secret put OPENAI_API_KEY   # later steps
#   npx wrangler secret put GEMINI_API_KEY   # later steps
# For local dev, put ADMIN_TOKEN in .dev.vars (see .dev.vars.example).
