<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Demo Day · Engine Compare (live)</title>
<style>
  :root{ --bg:#0b0d10; --panel:#14181d; --line:#222a31; --ink:#f4f7fa; --dim:#8c98a4;
         --openai:#10a37f; --gemini:#4c8dff; --good:#37d39b; --warn:#ffb454; --bad:#ff6b6b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100dvh;
    font:500 15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(11,13,16,.94);backdrop-filter:blur(8px);z-index:5;font-size:13px;font-weight:600;flex-wrap:wrap}
  .live-pill{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:5px 12px}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--good)}
  #activeName{text-transform:uppercase}
  .spacer{flex:1}
  a.btn{color:var(--ink);text-decoration:none;border:1px solid var(--line);background:var(--panel);
    border-radius:999px;padding:6px 12px;font-size:12px}
  .cols{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);min-height:0}
  .col{background:#0e1216;display:flex;flex-direction:column;min-height:0}
  .col h3{margin:0;padding:10px 14px;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .col[data-ch=openai] h3{color:var(--openai)} .col[data-ch=gemini] h3{color:var(--gemini)}
  .col h3 .st{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .col h3 .st.live{background:var(--good)} .col h3 .st.down{background:var(--bad)}
  .col h3 .onair{margin-left:auto;font-size:10px;letter-spacing:.08em;color:var(--bg);background:var(--good);
    border-radius:4px;padding:2px 6px;display:none}
  .col.is-active h3 .onair{display:inline}
  .feed{flex:1;overflow-y:auto;padding:12px 14px;scroll-behavior:smooth}
  .seg{margin-bottom:12px;padding-bottom:8px;border-bottom:1px dashed #1c242b}
  .seg .en{color:var(--dim);font-size:12px}
  .seg .zh{font-weight:650;font-size:16px;margin-top:2px}
  .seg.interim .zh{color:#9fb3c8;font-style:italic}
  @media (max-width:700px){ .cols{grid-template-columns:1fr} .col{min-height:45dvh} }
</style>
</head>
<body>
  <header>
    <span>引擎比較 Engine Compare</span>
    <span class="live-pill"><span class="dot"></span>Live to guests: <b id="activeName">…</b></span>
    <span class="spacer"></span>
    <a class="btn" id="switchLink" href="/switch" target="_blank" rel="noopener">Open switch ↗</a>
    <a class="btn" id="viewerLink" href="/viewer" target="_blank" rel="noopener">Guest view ↗</a>
  </header>
  <div class="cols">
    <div class="col" data-ch="openai">
      <h3><span class="st" id="st-openai"></span>OpenAI<span class="onair">ON AIR</span></h3>
      <div class="feed" id="feed-openai"></div>
    </div>
    <div class="col" data-ch="gemini">
      <h3><span class="st" id="st-gemini"></span>Gemini<span class="onair">ON AIR</span></h3>
      <div class="feed" id="feed-gemini"></div>
    </div>
  </div>
<script>
(function(){
  "use strict";
  var BASE = (new URLSearchParams(location.search).get("base") || "").replace(/\/$/,"");

  function setActive(active){
    document.getElementById("activeName").textContent = active || "—";
    document.querySelectorAll(".col").forEach(function(c){
      c.classList.toggle("is-active", c.dataset.ch === active);
    });
  }

  function column(ch){
    var feed = document.getElementById("feed-" + ch);
    var st = document.getElementById("st-" + ch);
    var nodes = {};
    function apply(s){
      var n = nodes[s.seq];
      if(!n){
        n = document.createElement("div"); n.className = "seg";
        n.innerHTML = '<div class="en"></div><div class="zh"></div>';
        feed.appendChild(n); nodes[s.seq] = n;
      }
      n.querySelector(".en").textContent = s.en || "";
      n.querySelector(".zh").textContent = s.zh || "";
      n.classList.toggle("interim", s.final === false);
      var stick = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 120;
      if(stick) feed.scrollTop = feed.scrollHeight;
    }
    var es = null, backoff = 1000;
    function connect(){
      es = new EventSource(BASE + "/api/stream?channel=" + ch);
      es.addEventListener("open", function(){ st.className = "st live"; backoff = 1000; });
      es.addEventListener("hello", function(ev){ try{ setActive(JSON.parse(ev.data).active); }catch(e){} });
      es.addEventListener("backlog", function(ev){ try{ (JSON.parse(ev.data).segments||[]).forEach(apply); }catch(e){} });
      es.addEventListener("clear", function(){ feed.innerHTML = ""; nodes = {}; });
      es.addEventListener("segment", function(ev){ try{ apply(JSON.parse(ev.data)); }catch(e){} });
      es.addEventListener("error", function(){
        st.className = "st down";
        if(es){ es.close(); es = null; }
        backoff = Math.min(backoff * 1.7, 15000);
        setTimeout(connect, backoff);
      });
    }
    connect();
  }
  column("openai");
  column("gemini");

  // Track switch flips via a lightweight poll (the per-engine streams don't carry switch events).
  function pollActive(){
    fetch(BASE + "/api/latest?channel=active", {cache:"no-store"})
      .then(function(r){ return r.json(); })
      .then(function(d){ setActive(d.active); }).catch(function(){});
  }
  pollActive(); setInterval(pollActive, 3000);

  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible") location.reload();
  });
})();
</script>
</body>
</html>
